# Repository Scanner — on-premise Docker Compose
#
# Prerequisites on the VM:
#   1. Docker + Docker Compose plugin installed
#   2. TLS certs generated:  bash deploy/generate-certs.sh <hostname>
#   3. Docker image loaded:   docker load -i repo-scanner-<build>.tar
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f

services:

  # ── Application (Gunicorn + Flask) ────────────────────────────────────────
  scanner:
    image: repo-scanner:latest      # loaded from .tar by the deploy script
    restart: unless-stopped

    environment:
      LOG_TARGET: stdout            # Docker captures stdout; avoids file-permission issues
      LOG_LEVEL:  info

    volumes:
      - ./feedback:/feedback    # feedback log persists across container restarts

    # RAM-backed tmpfs for archive extraction — fast and auto-cleaned
    tmpfs:
      - /tmp:size=2g,mode=1777

    mem_limit: 2g
    cpus: "2"

    # Not exposed to the host directly — Nginx proxies to it
    networks:
      - internal

    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ── Nginx (TLS termination + reverse proxy) ────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped

    ports:
      - "80:80"      # redirects to HTTPS
      - "443:443"    # TLS — the only entry point for real traffic

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro          # generated by generate-certs.sh

    depends_on:
      - scanner

    networks:
      - internal

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  internal:
    driver: bridge
