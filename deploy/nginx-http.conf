# Nginx configuration — HTTP only (no TLS)
#
# Use this instead of nginx.conf when deploying on an isolated internal network
# where TLS is terminated upstream (corporate load balancer, VPN boundary, etc.)
# or when TLS is genuinely not required.
#
# WARNING: traffic between clients and this server is unencrypted.
# Do not use this config if the server is reachable from untrusted networks.

events {
    worker_connections 1024;
}

http {

    upstream scanner_app {
        server scanner:8080;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Must be >= Flask MAX_CONTENT_LENGTH (500 MB)
        client_max_body_size 512M;
        client_body_timeout  300s;

        # ── Proxy to Gunicorn ──────────────────────────────────────────────
        location / {
            proxy_pass         http://scanner_app;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto http;
            proxy_set_header   Connection        "";

            # Allow long-running scans (must be < Gunicorn timeout of 600 s)
            proxy_read_timeout    580s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    580s;
        }

        # Health check — suppress access log noise
        location = /health {
            proxy_pass http://scanner_app;
            access_log off;
        }
    }
}
