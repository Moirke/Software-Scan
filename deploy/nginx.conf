# Nginx config for Repository Scanner — optional, only needed if you are
# running Nginx on the instance itself (e.g., for large-upload buffering).
#
# In a typical cloud deployment the load balancer terminates TLS and talks
# directly to the container on port 8080 — Nginx is not required in that case.
#
# If you do run Nginx here:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/scanner
#   sudo ln -s /etc/nginx/sites-available/scanner /etc/nginx/sites-enabled/scanner
#   sudo nginx -t && sudo systemctl reload nginx

upstream scanner_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # Replace with your domain if you need name-based vhosts.

    # ── Upload limits ─────────────────────────────────────────────────────
    # Must be >= Flask MAX_CONTENT_LENGTH (currently 500 MB).
    client_max_body_size 512M;
    client_body_timeout  300s;

    # ── Proxy to Gunicorn ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://scanner_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow long-running scan jobs (git clone + scan can take minutes).
        # Must be < Gunicorn timeout (GUNICORN_TIMEOUT env var, default 600 s).
        proxy_read_timeout    580s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    580s;
    }

    # ── Health check — no logging (keeps access log clean) ────────────────
    location = /health {
        proxy_pass http://scanner_app;
        access_log off;
    }
}
