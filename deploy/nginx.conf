# Nginx configuration for Repository Scanner (on-premise)
#
# Handles:
#   - TLS termination using certs from deploy/certs/
#   - HTTP → HTTPS redirect
#   - Reverse proxy to Gunicorn on scanner:8080
#   - Large upload buffering (ZIP files up to 500 MB)
#   - Long-running scan timeouts (up to 580 s)

events {
    worker_connections 1024;
}

http {

    upstream scanner_app {
        server scanner:8080;
        keepalive 32;
    }

    # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;     # replace with your hostname if using name-based vhosts

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Modern TLS only
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Must be >= Flask MAX_CONTENT_LENGTH (500 MB)
        client_max_body_size 512M;
        client_body_timeout  300s;

        # ── Proxy to Gunicorn ──────────────────────────────────────────────
        location / {
            proxy_pass         http://scanner_app;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Allow long-running scans (must be < Gunicorn timeout of 600 s)
            proxy_read_timeout    580s;
            proxy_connect_timeout  10s;
            proxy_send_timeout    580s;
        }

        # Health check — suppress access log noise
        location = /health {
            proxy_pass http://scanner_app;
            access_log off;
        }
    }
}
