# Nginx reverse-proxy config for Repository Scanner
# Place at: /etc/nginx/sites-available/scanner
# Enable with: ln -s /etc/nginx/sites-available/scanner /etc/nginx/sites-enabled/scanner

upstream scanner_app {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;          # Replace with your actual domain name

    # Redirect HTTP → HTTPS once a cert is in place.
    # Uncomment the line below and remove the rest of this server block.
    # return 301 https://$host$request_uri;

    # ── Upload / request limits ──────────────────────────────────────
    client_max_body_size 512M;      # Must be >= Flask MAX_CONTENT_LENGTH
    client_body_timeout  120s;

    # ── Proxy to Gunicorn ────────────────────────────────────────────
    location / {
        proxy_pass         http://scanner_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow long-running scan jobs (git clone + scan can take minutes)
        proxy_read_timeout    600s;
        proxy_connect_timeout  10s;
        proxy_send_timeout    600s;
    }
}

